<div *ngIf="datos?.length > 0; else noResenias">
    <table mat-table [dataSource]="datos" class="mat-elevation-z8">

        <ng-container matColumnDef="usuario">
            <th mat-header-cell *matHeaderCellDef>{{ 'USERNAME' | translate }}</th>
            <td mat-cell *matCellDef="let resenia">{{ resenia.usuario.nombre }}</td>
        </ng-container>

        <ng-container matColumnDef="producto">
            <th mat-header-cell *matHeaderCellDef>{{ 'PRODUCT' | translate }}</th>
            <td mat-cell *matCellDef="let resenia">{{ resenia.producto.nombre }}</td>
        </ng-container>

        <ng-container matColumnDef="fecha">
            <th mat-header-cell *matHeaderCellDef>{{ 'DATE' | translate }}</th>
            <td mat-cell *matCellDef="let resenia">{{ resenia.fecha | date: 'dd/MM/yyyy HH:mm' }}</td>
        </ng-container>

        <ng-container matColumnDef="valoracion">
            <th mat-header-cell *matHeaderCellDef>{{ 'RATING' | translate }}</th>
            <td mat-cell *matCellDef="let resenia">{{ resenia.valoracion }} / 5</td>
        </ng-container>

        <ng-container matColumnDef="detalle">
            <th mat-header-cell *matHeaderCellDef></th>
            <td mat-cell *matCellDef="let resenia">
                <button mat-mini-fab [matTooltip]="'REVIEW_DETAIL' | translate" color="#B71D2C" (click)="detalle(resenia.id)">
                    <mat-icon>visibility</mat-icon>
                </button>
            </td>
        </ng-container>

        <tr mat-header-row *matHeaderRowDef="columnas"></tr>
        <tr mat-row *matRowDef="let row; columns: columnas;"></tr>
    </table>
</div>

<ng-template #noResenias>
    <p>{{ 'NO_REVIEWS' | translate }}</p>
</ng-template>
