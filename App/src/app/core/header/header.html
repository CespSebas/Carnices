<mat-toolbar class="app-header">

  <!-- Logo -->
  <div class="header-left">
    <button mat-button [routerLink]="['/inicio']" class="logo-section" aria-label="Logo Carnices">
      <span class="app-name"> </span>
    </button>
  </div>

  <span class="header-spacer"></span>

  <!-- Navegación desktop -->
  <div class="header-center">
    <button mat-button [routerLink]="['/inicio']" class="main-btn">
      <span>{{ 'HOME' | translate }}</span>
    </button>
    <button mat-button [routerLink]="['/producto']" class="main-btn">
      <span>{{ 'PRODUCTS' | translate }}</span>
    </button>
    <button mat-button [routerLink]="['/pedido']" class="main-btn">
      <span>{{ 'ORDERS' | translate }}</span>
    </button>
    <button mat-button [routerLink]="['/acercade']" class="main-btn">
      <span>{{ 'ABOUT' | translate }}</span>
    </button>
  </div>

  <span class="header-spacer"></span>

  <!-- Acciones de usuario -->
  <div class="header-right">
    <button mat-icon-button class="cart-button" [matBadge]="qtyItems()" matBadgeColor="warn" aria-label="Carrito">
      <mat-icon>shopping_cart</mat-icon>
    </button>

    <span *ngIf="isAuthenticated()" class="user-email">{{ currentUser()?.correo }}</span>

    <button mat-icon-button aria-label="Usuario">
      <mat-icon>{{ isAuthenticated() ? 'account_circle' : 'person' }}</mat-icon>
    </button>

    <button mat-button [matMenuTriggerFor]="languageMenu" aria-label="Cambiar idioma">
      <mat-icon>language</mat-icon>
    </button>

    <!-- Hamburger solo en móvil -->
    <button mat-icon-button class="hamburger-btn" [matMenuTriggerFor]="mobileMenu" aria-label="Menú">
      <mat-icon>menu</mat-icon>
    </button>
  </div>

  <!-- Menú desplegable móvil -->
  <mat-menu #mobileMenu="matMenu">
    <button mat-menu-item [routerLink]="['/inicio']">
      <mat-icon>home</mat-icon>
      <span>{{ 'HOME' | translate }}</span>
    </button>
    <button mat-menu-item [routerLink]="['/producto']">
      <mat-icon>storefront</mat-icon>
      <span>{{ 'PRODUCTS' | translate }}</span>
    </button>
    <button mat-menu-item [routerLink]="['/pedido']">
      <mat-icon>receipt_long</mat-icon>
      <span>{{ 'ORDERS' | translate }}</span>
    </button>
    <button mat-menu-item [routerLink]="['/acercade']">
      <mat-icon>info</mat-icon>
      <span>{{ 'ABOUT' | translate }}</span>
    </button>
  </mat-menu>

  <mat-menu #languageMenu="matMenu">
    <button mat-menu-item (click)="changeLanguage('es')">
      <img src="../../../assets/cr.svg" alt="Español" width="20" height="20" style="margin-right:8px;">
      {{ 'SPANISH' | translate }}
    </button>
    <button mat-menu-item (click)="changeLanguage('en')">
      <img src="../../../assets/us.svg" alt="English" width="20" height="20" style="margin-right:8px;">
      {{ 'ENGLISH' | translate }}
    </button>
  </mat-menu>

</mat-toolbar>
